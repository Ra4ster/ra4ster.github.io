<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Jack Rose | Portfolio</title>

    <meta
      name="description"
      content="Portfolio of Jack Rose - data analytics, systems programming, machine learning, and performance-focused software projects."

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" />

    <!-- Theme color (mobile browser UI) -->

    <!-- Open Graph (LinkedIn, Discord, etc.) -->
    <meta property="og:title" content="Jack Rose | Portfolio" />

      property="og:description"

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="Systems, ML, and analytics work focused on performance and real-world impact."
    />

    <!-- Fonts (if using Inter explicitly) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"

    />
